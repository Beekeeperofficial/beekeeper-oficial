<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beekeeper Oficial</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://sdk.mercadopago.com/js/v2"></script>
</head>
<body>

  <header>
    <div class="logo">
      <img src="assets/logo.png" alt="Beekeeper Logo">
    </div>
    <div class="cart-icon" onclick="toggleCart()">
      🛒 <span id="cart-count">0</span>
    </div>
  </header>

  <section class="hero">
    <h1>Elegância que impõe presença.</h1>
    <button onclick="scrollToProducts()">Explorar Coleção</button>
  </section>

  <section class="products" id="products">
    <h2>Coleção</h2>
    <div class="product-grid" id="product-grid">
      <!-- Produtos serão inseridos via JS -->
    </div>
  </section>

  <div class="cart" id="cart">
    <h3>Carrinho</h3>
    <div id="cart-items"></div>
    <div class="cart-total">
      Total: R$ <span id="cart-total">0.00</span>
    </div>
    <button class="checkout-btn" onclick="checkout()">Finalizar Compra</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
